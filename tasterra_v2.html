<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasterra — Find Your Next Favorite Spot</title>
  <meta name="description" content="Tell Tasterra what you're craving, the vibe you're after, or where you're headed — and it finds exactly the right place." />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── TOKENS ── */
    :root {
      --bg:           #F7F3EE;
      --card:         #FAF7F3;
      --border:       #E4D9BC;
      --text:         #1C1410;
      --muted:        #78716C;
      --accent:       #C2622A;
      --accent-hover: #a8501f;
      --gold:         #C49A2A;
      --radius:       1.5rem;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
      background: rgba(247, 243, 238, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent) 0%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .nav-link {
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      background: none;
    }
    .nav-link:hover { color: var(--text); }
    .nav-link.active {
      background: rgba(194, 98, 42, 0.1);
      color: var(--accent);
    }
    .nav-cities {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .city-pill {
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      transition: all 0.15s;
    }
    .city-pill.active {
      background: var(--accent);
      color: #fff;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
    }

    /* ── GOD RAYS ── */
    .god-rays {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .god-rays::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -10%;
      width: 80vw;
      height: 140vh;
      background: conic-gradient(
        from 200deg at 80% 0%,
        transparent 0deg,
        rgba(194,98,42,0.06) 8deg,
        transparent 16deg,
        rgba(196,154,42,0.05) 24deg,
        transparent 32deg,
        rgba(194,98,42,0.04) 40deg,
        transparent 55deg
      );
      animation: rays 18s linear infinite;
    }
    .god-rays::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 70vw;
      height: 120vh;
      background: conic-gradient(
        from 20deg at 20% 100%,
        transparent 0deg,
        rgba(196,154,42,0.04) 10deg,
        transparent 20deg,
        rgba(194,98,42,0.03) 30deg,
        transparent 45deg
      );
      animation: rays 24s linear infinite reverse;
    }
    @keyframes rays {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── MAIN DISCOVER ── */
    .discover {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 1.5rem 2rem;
      position: relative;
      z-index: 1;
    }
    .discover-inner {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* ── GREETING ── */
    .greeting {
      text-align: center;
      animation: fadeUp 0.7s ease-out both;
    }
    .greeting h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.2rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent) 0%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
      margin-bottom: 0.5rem;
    }
    .greeting p {
      color: var(--muted);
      font-size: 1.05rem;
    }

    /* ── CHAT MESSAGES ── */
    .chat-messages {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-height: 340px;
      overflow-y: auto;
      padding: 0 0.25rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      animation: fadeUp 0.7s 0.1s ease-out both;
    }
    .chat-messages:empty { display: none; }
    .msg {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      animation: fadeUp 0.35s ease-out both;
    }
    .msg.user { flex-direction: row-reverse; }
    .msg-icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .msg.user .msg-icon {
      background: linear-gradient(135deg, var(--accent), var(--gold));
      color: #fff;
    }
    .msg.ai .msg-icon {
      background: var(--card);
      border: 1px solid var(--border);
      font-size: 1rem;
    }
    .msg-bubble {
      max-width: 78%;
      padding: 0.75rem 1rem;
      border-radius: 1.1rem;
      font-size: 0.9rem;
      line-height: 1.55;
    }
    .msg.user .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 0.3rem;
    }
    .msg.ai .msg-bubble {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 0.3rem;
    }
    .typing { display: flex; gap: 5px; align-items: center; padding: 0.3rem 0; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{ opacity:0.25; transform:scale(0.85); } 40%{ opacity:1; transform:scale(1); } }

    /* ── PROMPT BOX ── */
    .prompt-wrap {
      width: 100%;
      animation: fadeUp 0.7s 0.18s ease-out both;
    }
    .prompt-box {
      width: 100%;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 0.75rem 0.5rem;
      box-shadow: 0 8px 30px rgba(28,20,16,0.07);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .prompt-box:focus-within {
      border-color: rgba(194,98,42,0.45);
      box-shadow: 0 8px 30px rgba(194,98,42,0.1);
    }
    .prompt-box textarea {
      width: 100%;
      min-height: 44px;
      max-height: 180px;
      border: none;
      background: transparent;
      resize: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      line-height: 1.5;
    }
    .prompt-box textarea::placeholder { color: var(--muted); }
    .prompt-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.4rem;
    }
    .attach-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
      font-size: 1rem;
    }
    .attach-btn:hover { background: rgba(194,98,42,0.08); color: var(--accent); }
    .send-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      font-size: 1rem;
    }
    .send-btn.empty {
      background: transparent;
      color: var(--muted);
    }
    .send-btn.has-content {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 10px rgba(194,98,42,0.35);
    }
    .send-btn.has-content:hover { background: var(--accent-hover); }

    /* ── FOOTER HINT ── */
    .powered {
      font-size: 0.72rem;
      color: rgba(120,113,108,0.45);
      animation: fadeUp 0.8s 0.4s ease-out both;
    }

    /* ── SUGGESTION CHIPS ── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      animation: fadeUp 0.7s 0.28s ease-out both;
    }
    .chip {
      padding: 0.4rem 1rem;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--card);
      font-size: 0.82rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .chip:hover {
      border-color: rgba(194,98,42,0.4);
      color: var(--accent);
      background: rgba(194,98,42,0.05);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESTAURANT CARDS (appear after AI reply) ── */
    .cards-section {
      width: 100%;
      display: none;
      flex-direction: column;
      gap: 0.75rem;
      animation: fadeUp 0.5s ease-out both;
    }
    .cards-section.visible { display: flex; }
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .r-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .r-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(28,20,16,0.1); }
    .r-card img {
      width: 100%; height: 110px;
      object-fit: cover;
    }
    .r-card-body { padding: 0.65rem 0.75rem; }
    .r-card-name { font-size: 0.875rem; font-weight: 600; color: var(--text); }
    .r-card-meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- God Rays -->
<div class="god-rays"></div>

<!-- Navbar -->
<nav>
  <span class="nav-logo">Tasterra</span>
  <div class="nav-links">
    <button class="nav-link active">Discover</button>
    <button class="nav-link">Traveler Mode</button>
    <button class="nav-link">Saved</button>
  </div>
  <div class="nav-cities">
    <button class="city-pill active" onclick="setCity(this,'NYC')">NYC</button>
    <button class="city-pill" onclick="setCity(this,'Los Angeles')">Los Angeles</button>
    <button class="city-pill" onclick="setCity(this,'DC')">DC</button>
    <button class="city-pill" onclick="setCity(this,'Chicago')">Chicago</button>
    <button class="city-pill" onclick="setCity(this,'Miami')">Miami</button>
  </div>
  <div class="nav-right">
    <div class="avatar">J</div>
  </div>
</nav>

<!-- Discover Page -->
<main class="discover">
  <div class="discover-inner">

    <!-- Greeting -->
    <div class="greeting">
      <h1>Hey Jack 👋</h1>
      <p>Where are you eating tonight? Ask me anything.</p>
    </div>

    <!-- Chat thread (hidden until first message) -->
    <div class="chat-messages" id="chatMessages"></div>

    <!-- Restaurant cards (hidden until AI responds) -->
    <div class="cards-section" id="cardsSection">
      <div style="font-size:0.8rem;color:var(--muted);font-weight:500;letter-spacing:0.03em;">TASTERRA PICKS</div>
      <div class="cards-grid" id="cardsGrid"></div>
    </div>

    <!-- Suggestion chips -->
    <div class="chips" id="chips">
      <button class="chip" onclick="sendChip(this)">🕯️ Romantic dinner</button>
      <button class="chip" onclick="sendChip(this)">💎 Hidden gem</button>
      <button class="chip" onclick="sendChip(this)">🌙 Late night eats</button>
      <button class="chip" onclick="sendChip(this)">👥 Group dinner</button>
      <button class="chip" onclick="sendChip(this)">✈️ Traveler mode</button>
    </div>

    <!-- Prompt box -->
    <div class="prompt-wrap">
      <div class="prompt-box">
        <textarea
          id="chatInput"
          placeholder="Find me a great spot in NYC…"
          rows="1"
          oninput="onInput(this)"
          onkeydown="onKey(event)"
        ></textarea>
        <div class="prompt-actions">
          <button class="attach-btn" title="Attach">📎</button>
          <button class="send-btn empty" id="sendBtn" onclick="sendMessage()">↑</button>
        </div>
      </div>
    </div>

    <p class="powered" id="poweredBy">Powered by Tasterra AI · NYC</p>
  </div>
</main>

<script>
  let currentCity = 'NYC';
  let msgCount = 0;

  const AI_REPLIES = [
    `Here are three spots I think you'll love in <strong>${() => currentCity}</strong>:<br><br>
     🍝 <strong>Don Angie</strong> — West Village Italian. The pinwheel lasagna is legendary. Perfect for a date night.<br>
     🥩 <strong>Quality Meats</strong> — Modern steakhouse, great cocktail program. Book a week ahead.<br>
     🍜 <strong>Momofuku Noodle Bar</strong> — Iconic East Village ramen. No reservation needed, walk-in vibes.`,
    `Great taste! Based on what you've shared, I'd try:<br><br>
     🌮 <strong>Los Tacos No.1</strong> — Chelsea Market, best tacos in the city, cash only and totally worth it.<br>
     🍣 <strong>Sushi Nakazawa</strong> — Omakase on Commerce St. Book two months out — insane quality.<br>
     🍔 <strong>J.G. Melon</strong> — Classic UES burger. Nothing fancy, just perfect.`,
    `Love that vibe! Here's what Tasterra recommends:<br><br>
     🥂 <strong>Employees Only</strong> — Speakeasy cocktails in the West Village. Goes late.<br>
     🍕 <strong>Lucali</strong> — Carroll Gardens pizza institution. BYOB, bring candles, prepare to wait.<br>
     🌊 <strong>The Fulton</strong> — Jean-Georges seafood on the waterfront. Special occasion energy.`,
  ];

  const RESTAURANT_DATA = [
    {
      name: 'Don Angie', meta: 'Italian · $$$',
      img: 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=400&h=220&fit=crop'
    },
    {
      name: 'Quality Meats', meta: 'Steakhouse · $$$',
      img: 'https://images.unsplash.com/photo-1544025162-d76694265947?w=400&h=220&fit=crop'
    },
    {
      name: 'Momofuku', meta: 'Japanese · $$',
      img: 'https://images.unsplash.com/photo-1569718212165-3a8278d5f624?w=400&h=220&fit=crop'
    },
    {
      name: 'Sushi Nakazawa', meta: 'Omakase · $$$$',
      img: 'https://images.unsplash.com/photo-1559410545-0bdcd187e0a6?w=400&h=220&fit=crop'
    },
  ];

  function setCity(el, city) {
    currentCity = city;
    document.querySelectorAll('.city-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('poweredBy').textContent = `Powered by Tasterra AI · ${city}`;
    document.getElementById('chatInput').placeholder = `Find me a great spot in ${city}…`;
  }

  function onInput(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 180) + 'px';
    const btn = document.getElementById('sendBtn');
    if (el.value.trim()) {
      btn.classList.remove('empty');
      btn.classList.add('has-content');
    } else {
      btn.classList.remove('has-content');
      btn.classList.add('empty');
    }
  }

  function onKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function sendChip(el) {
    const input = document.getElementById('chatInput');
    input.value = el.textContent.trim();
    onInput(input);
    sendMessage();
  }

  function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;

    // Hide chips after first message
    document.getElementById('chips').style.display = 'none';

    const messages = document.getElementById('chatMessages');

    // User message
    const userMsg = document.createElement('div');
    userMsg.className = 'msg user';
    userMsg.innerHTML = `<div class="msg-icon">J</div><div class="msg-bubble">${escHtml(text)}</div>`;
    messages.appendChild(userMsg);

    input.value = '';
    input.style.height = 'auto';
    const btn = document.getElementById('sendBtn');
    btn.classList.remove('has-content');
    btn.classList.add('empty');
    messages.scrollTop = messages.scrollHeight;

    // Typing indicator
    const typing = document.createElement('div');
    typing.className = 'msg ai';
    typing.innerHTML = `<div class="msg-icon">🍽️</div><div class="msg-bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    messages.appendChild(typing);
    messages.scrollTop = messages.scrollHeight;

    // AI reply
    setTimeout(() => {
      typing.remove();
      const reply = AI_REPLIES[msgCount % AI_REPLIES.length];
      const aiMsg = document.createElement('div');
      aiMsg.className = 'msg ai';
      aiMsg.innerHTML = `<div class="msg-icon">🍽️</div><div class="msg-bubble">${reply.replace('${() => currentCity}', currentCity)}</div>`;
      messages.appendChild(aiMsg);
      messages.scrollTop = messages.scrollHeight;
      msgCount++;

      // Show restaurant cards after first AI reply
      showCards();
    }, 1400);
  }

  function showCards() {
    const section = document.getElementById('cardsSection');
    const grid = document.getElementById('cardsGrid');
    if (section.classList.contains('visible')) return;
    grid.innerHTML = '';
    RESTAURANT_DATA.forEach(r => {
      const card = document.createElement('div');
      card.className = 'r-card';
      card.innerHTML = `
        <img src="${r.img}" alt="${r.name}" loading="lazy" />
        <div class="r-card-body">
          <div class="r-card-name">${r.name}</div>
          <div class="r-card-meta">${r.meta}</div>
        </div>`;
      grid.appendChild(card);
    });
    section.classList.add('visible');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
